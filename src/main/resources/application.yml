spring:
  datasource:
    url: jdbc:mysql://localhost:3306/coffee
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

  kafka:
    bootstrap-servers: localhost:9092,localhost:9093,localhost:9094


  data:
    redis:
      host: localhost
      port: 6379
